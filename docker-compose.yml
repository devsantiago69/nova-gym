services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: gymchallenge, POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD}", POSTGRES_DB: gymchallenge }
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gymchallenge"], interval: 5s, timeout: 5s, retries: 10 }
  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID:?Define S3_ACCESS_KEY_ID}", MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY:?Define S3_SECRET_ACCESS_KEY}" }
    ports: ["127.0.0.1:9000:9000", "127.0.0.1:9001:9001"]
    volumes: [minio_data:/data]
    healthcheck: { test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"], interval: 10s, timeout: 5s, retries: 5 }
  web:
    build: { context: ., args: { TARGET: web } }
    env_file: .env
    ports: ["127.0.0.1:3000:3000"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
  worker:
    build: { context: ., args: { TARGET: worker } }
    command: pnpm --filter @gymchallenge/worker start
    env_file: .env
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
volumes: { postgres_data: {}, redis_data: {}, minio_data: {} }
